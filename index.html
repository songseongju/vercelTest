<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --danger: #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 0;
      box-shadow: 0 2px 8px rgba(79,70,229,.3);
    }

    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.5px; }
    header span { font-size: .85rem; opacity: .8; }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.25rem;
    }

    /* 작성 폼 */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .form-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--primary); }

    .form-row { display: flex; gap: .75rem; margin-bottom: .75rem; }
    .form-row input { flex: 1; }

    input, textarea {
      width: 100%;
      padding: .6rem .9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .92rem;
      font-family: inherit;
      color: var(--text);
      transition: border-color .15s;
      background: #fafafa;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    .form-actions { display: flex; justify-content: flex-end; margin-top: .75rem; }

    button {
      padding: .55rem 1.3rem;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(.97); }

    .btn-delete {
      background: none;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: .3rem .75rem;
      font-size: .8rem;
    }
    .btn-delete:hover { background: #fef2f2; }

    /* 검색 & 카운트 */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .toolbar input { max-width: 260px; }

    .post-count { font-size: .85rem; color: var(--muted); white-space: nowrap; }

    /* 게시글 목록 */
    .post-list { display: flex; flex-direction: column; gap: .75rem; }

    .post-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }

    .post-item:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }

    .post-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .5rem;
    }

    .post-title {
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
    }

    .post-title:hover { color: var(--primary); }

    .post-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    .post-meta span + span::before { content: ' · '; }

    .post-body {
      margin-top: .75rem;
      font-size: .9rem;
      line-height: 1.65;
      color: #334155;
      white-space: pre-wrap;
      display: none;
      border-top: 1px solid var(--border);
      padding-top: .75rem;
    }

    .post-body.open { display: block; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .95rem;
    }

    /* 페이지네이션 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: .4rem;
      margin-top: 1.75rem;
    }

    .pagination button {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 8px;
      font-size: .85rem;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .pagination button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .pagination button:hover:not(.active) { background: var(--bg); }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      header .inner { flex-direction: column; gap: .25rem; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <h1>📋 자유 게시판</h1>
    <span id="dateDisplay"></span>
  </div>
</header>

<main>
  <!-- 작성 폼 -->
  <div class="form-card">
    <h2>✏️ 새 글 작성</h2>
    <div class="form-row">
      <input type="text" id="inputAuthor" placeholder="작성자" maxlength="20" />
      <input type="text" id="inputTitle" placeholder="제목" maxlength="60" />
    </div>
    <textarea id="inputContent" placeholder="내용을 입력하세요..."></textarea>
    <div class="form-actions">
      <button class="btn-primary" onclick="submitPost()">등록하기</button>
    </div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  제목 또는 작성자 검색" oninput="renderPosts()" />
    <span class="post-count" id="postCount"></span>
  </div>

  <!-- 게시글 목록 -->
  <div class="post-list" id="postList"></div>

  <!-- 페이지네이션 -->
  <div class="pagination" id="pagination"></div>
</main>

<script>
  const PER_PAGE = 5;
  let currentPage = 1;
  let posts = JSON.parse(localStorage.getItem('bb_posts') || '[]');

  /* 날짜 표시 */
  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  function savePosts() {
    localStorage.setItem('bb_posts', JSON.stringify(posts));
  }

  function timeAgo(isoString) {
    const diff = (Date.now() - new Date(isoString)) / 1000;
    if (diff < 60) return '방금 전';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    if (diff < 604800) return `${Math.floor(diff/86400)}일 전`;
    return new Date(isoString).toLocaleDateString('ko-KR');
  }

  function submitPost() {
    const author  = document.getElementById('inputAuthor').value.trim() || '익명';
    const title   = document.getElementById('inputTitle').value.trim();
    const content = document.getElementById('inputContent').value.trim();

    if (!title) { alert('제목을 입력해 주세요.'); return; }
    if (!content) { alert('내용을 입력해 주세요.'); return; }

    posts.unshift({ id: Date.now(), author, title, content, date: new Date().toISOString() });
    savePosts();

    document.getElementById('inputTitle').value = '';
    document.getElementById('inputContent').value = '';
    currentPage = 1;
    renderPosts();
  }

  function deletePost(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    posts = posts.filter(p => p.id !== id);
    savePosts();
    renderPosts();
  }

  function toggleBody(id) {
    const el = document.getElementById('body-' + id);
    el.classList.toggle('open');
  }

  function renderPosts() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = query
      ? posts.filter(p => p.title.toLowerCase().includes(query) || p.author.toLowerCase().includes(query))
      : posts;

    const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PER_PAGE;
    const pagePosts = filtered.slice(start, start + PER_PAGE);

    document.getElementById('postCount').textContent = `총 ${filtered.length}개의 글`;

    const list = document.getElementById('postList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">등록된 게시글이 없습니다.</div>';
    } else {
      list.innerHTML = pagePosts.map((p, i) => `
        <div class="post-item">
          <div class="post-header">
            <div>
              <div class="post-title" onclick="toggleBody(${p.id})">${escHtml(p.title)}</div>
              <div class="post-meta">
                <span>✍️ ${escHtml(p.author)}</span>
                <span>${timeAgo(p.date)}</span>
              </div>
            </div>
            <button class="btn-delete" onclick="deletePost(${p.id})">삭제</button>
          </div>
          <div class="post-body" id="body-${p.id}">${escHtml(p.content)}</div>
        </div>
      `).join('');
    }

    /* 페이지네이션 */
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = '';
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    pg.innerHTML = html;
  }

  function goPage(n) {
    currentPage = n;
    renderPosts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* 초기 샘플 데이터 */
  if (posts.length === 0) {
    posts = [
      { id: 3, author: '관리자', title: '게시판 이용 안내', content: '자유롭게 글을 작성하실 수 있습니다.\n욕설 및 비방 글은 삭제될 수 있습니다.', date: new Date(Date.now() - 3600000).toISOString() },
      { id: 2, author: '홍길동', title: '안녕하세요 반갑습니다!', content: '처음 방문했는데 게시판이 깔끔하네요 👍', date: new Date(Date.now() - 7200000).toISOString() },
      { id: 1, author: '테스터', title: '테스트 글입니다', content: '이 글은 샘플 글입니다. 삭제해도 됩니다.', date: new Date(Date.now() - 86400000).toISOString() },
    ];
    savePosts();
  }

  renderPosts();
</script>

</body>
</html>
